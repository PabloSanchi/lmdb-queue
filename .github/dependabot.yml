version: 2

updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: weekly
      timezone: Europe/Amsterdam
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps:"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      timezone: Europe/Amsterdam
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps(actions):"