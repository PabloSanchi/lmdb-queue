name: Publish

on:
  workflow_dispatch:
    inputs:
      bump:
        description: >
          Version bump. 'auto' inspects commit messages since the last tag
          (Conventional Commits: feat=minor, fix=patch, "!"/BREAKING CHANGE=major).
        required: true
        default: auto
        type: choice
        options:
          - auto
          - patch
          - minor
          - major

concurrency:
  group: publish-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/equeue/
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Guard against wrong branch
        run: |
          ref="${{ github.ref }}"
          if [ "$ref" != "refs/heads/main" ] && [ "$ref" != "refs/heads/master" ]; then
            echo "::error::Publish must be run from main/master, not '$ref'."
            exit 1
          fi

      - name: Checkout full history
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Find previous version
        id: prev
        run: |
          prev_tag=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          if [ -z "$prev_tag" ]; then
            echo "No previous tag found, starting from v0.0.0"
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "version=0.0.0" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$prev_tag" >> "$GITHUB_OUTPUT"
            echo "version=${prev_tag#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine bump type
        id: bump
        run: |
          chosen="${{ inputs.bump }}"
          if [ "$chosen" != "auto" ]; then
            echo "Using manually selected bump: $chosen"
            echo "type=$chosen" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          range=""
          if [ -n "${{ steps.prev.outputs.tag }}" ]; then
            range="${{ steps.prev.outputs.tag }}..HEAD"
          fi
          log=$(git log $range --pretty=format:'%s%n%b' || true)

          if echo "$log" | grep -Eiq '(^|[^a-z])breaking change|^[a-z]+(\([^)]*\))?!:'; then
            type=major
          elif echo "$log" | grep -Eiq '^feat(\([^)]*\))?:'; then
            type=minor
          elif echo "$log" | grep -Eiq '^fix(\([^)]*\))?:'; then
            type=patch
          else
            type=patch
          fi

          echo "Auto-detected bump: $type"
          echo "type=$type" >> "$GITHUB_OUTPUT"

      - name: Compute next version
        id: next
        run: |
          IFS='.' read -r major minor patch <<< "${{ steps.prev.outputs.version }}"
          case "${{ steps.bump.outputs.type }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          next="v${major}.${minor}.${patch}"
          echo "Next version: $next (bump: ${{ steps.bump.outputs.type }})"
          echo "version=$next" >> "$GITHUB_OUTPUT"

      - name: Create annotated tag locally
        run: git tag -a "${{ steps.next.outputs.version }}" -m "Release ${{ steps.next.outputs.version }}"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install build tools
        run: pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check package metadata
        run: twine check dist/*

      - name: Verify built version is a clean release
        run: |
          built=$(python -c "import importlib.metadata as m; print(m.version('equeue'))")
          echo "Built version: $built"
          expected="${{ steps.next.outputs.version }}"
          expected="${expected#v}"
          if [ "$built" != "$expected" ]; then
            echo "::error::Built version '$built' does not match expected '$expected'. Tag was likely not picked up cleanly."
            exit 1
          fi

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

      - name: Push release tag
        run: git push origin "${{ steps.next.outputs.version }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.next.outputs.version }}
          generate_release_notes: true
          files: dist/*